name: Daily Report

on:
  schedule:
    # 每天 UTC 16:00 执行（北京时间次日 00:00）
    - cron: "0 16 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  generate-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 用于 git commit & push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/scheduler.py daily

      - name: Commit and push report + data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/
          git diff --staged --quiet || (git commit -m "📋 Daily report $(date +%Y-%m-%d)" && git push)
